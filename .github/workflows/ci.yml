name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.25.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Module sanity
        run: |
          go mod download
          go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

  build:
    name: build (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Cross-compile (pure Go, no CGo)
        env:
          CGO_ENABLED: '0'
        run: |
          for tuple in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${tuple%/*}"
            arch="${tuple#*/}"
            echo "=== $os/$arch ==="
            GOOS="$os" GOARCH="$arch" go build ./...
          done
